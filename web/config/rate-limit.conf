# Throttle login attempts per client IP to slow down brute-force/credential
# guessing against /auth/check.php. Must live in the http{} context, hence
# this separate conf.d file (perlite.conf only defines a server{} block).
limit_req_zone $binary_remote_addr zone=perlite_login:10m rate=5r/m;
limit_req_status 429;
